name: OpenCSI remote ZIP inventory

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/opencsi-remote-zip-inventory.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory-opencsi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install range-aware ZIP reader
        run: python -m pip install remotezip requests

      - name: Inventory archive without full download
        env:
          OPENCSI_URL: "https://ndownloader.figshare.com/files/34809589"
          OPENCSI_MD5: "7d83f1682d05fa230bba3e90f755c580"
          OPENCSI_DOI: "10.6084/m9.figshare.19596379.v1"
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import json
          import os
          from pathlib import Path, PurePosixPath

          import requests
          from remotezip import RemoteZip

          url = os.environ["OPENCSI_URL"]
          output = Path("opencsi_remote_inventory")
          output.mkdir(parents=True, exist_ok=True)

          head = requests.head(url, allow_redirects=True, timeout=60)
          head.raise_for_status()
          headers = {
              "final_url": head.url,
              "status_code": head.status_code,
              "content_length": head.headers.get("Content-Length"),
              "accept_ranges": head.headers.get("Accept-Ranges"),
              "etag": head.headers.get("ETag"),
              "last_modified": head.headers.get("Last-Modified"),
              "content_type": head.headers.get("Content-Type"),
          }

          rows = []
          with RemoteZip(url) as archive:
              bad_paths = []
              for info in archive.infolist():
                  path = PurePosixPath(info.filename)
                  if path.is_absolute() or ".." in path.parts:
                      bad_paths.append(info.filename)
                  rows.append({
                      "path": info.filename,
                      "is_dir": info.is_dir(),
                      "size_bytes": info.file_size,
                      "compressed_bytes": info.compress_size,
                      "compression_type": info.compress_type,
                      "crc32": f"{info.CRC:08x}",
                      "suffix": path.suffix.lower(),
                      "depth": len(path.parts),
                  })
              if bad_paths:
                  raise RuntimeError(f"Unsafe archive paths: {bad_paths[:10]}")

          with (output / "members.csv").open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=list(rows[0]))
              writer.writeheader()
              writer.writerows(rows)

          suffix_counts = {}
          suffix_sizes = {}
          for row in rows:
              suffix = row["suffix"] or "<none>"
              suffix_counts[suffix] = suffix_counts.get(suffix, 0) + 1
              suffix_sizes[suffix] = suffix_sizes.get(suffix, 0) + int(row["size_bytes"])

          summary = {
              "source_doi": os.environ["OPENCSI_DOI"],
              "figshare_file_id": 34809589,
              "figshare_md5": os.environ["OPENCSI_MD5"],
              "http_headers": headers,
              "member_count": len(rows),
              "uncompressed_size_bytes": sum(int(row["size_bytes"]) for row in rows),
              "compressed_member_size_bytes": sum(int(row["compressed_bytes"]) for row in rows),
              "suffix_counts": suffix_counts,
              "suffix_uncompressed_sizes": suffix_sizes,
              "paper_eligible": False,
              "purpose": "remote_archive_inventory_only",
          }
          (output / "summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8")

          largest = sorted((row for row in rows if not row["is_dir"]), key=lambda row: int(row["size_bytes"]), reverse=True)[:30]
          (output / "largest_members.json").write_text(json.dumps(largest, indent=2), encoding="utf-8")

          print(json.dumps(summary, indent=2, sort_keys=True))
          print("TOP-LEVEL AND REPRESENTATIVE MEMBERS")
          for row in rows[:100]:
              print(row)
          print("LARGEST MEMBERS")
          for row in largest:
              print(row)
          PY

      - name: Upload inventory only
        uses: actions/upload-artifact@v4
        with:
          name: opencsi-remote-zip-inventory
          path: opencsi_remote_inventory/
          if-no-files-found: error
          retention-days: 30
