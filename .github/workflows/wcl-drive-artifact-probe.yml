name: WCL Drive Uploader Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wcl-drive-artifact-probe.yml'
      - 'tools/wcl_full_run_drive_upload.py'
      - 'tools/WCL_Full_Run_Drive_Upload.ipynb'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate uploader source and notebook
        run: |
          python -m py_compile tools/wcl_full_run_drive_upload.py
          python - <<'PY'
          import ast
          import json
          from pathlib import Path

          script = Path('tools/wcl_full_run_drive_upload.py')
          notebook = Path('tools/WCL_Full_Run_Drive_Upload.ipynb')
          source = script.read_text(encoding='utf-8')
          ast.parse(source)
          nb = json.loads(notebook.read_text(encoding='utf-8'))
          assert nb['nbformat'] == 4
          assert len(nb['cells']) == 2
          assert 'ee64b6ee9348e31015177fcd767b035757c27b9bf6c9f22b8607704b26701ee4' in source
          assert '155_612_278' in source
          assert '1LJFUH-m_y5u6arQ_o0r8x66XaNjM2QOP' in source
          print('WCL uploader validation passed')
          PY
