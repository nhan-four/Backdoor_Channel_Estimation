name: Measured-trace archive probe v4 direct

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/measured-trace-probe-v4-direct.yml"
      - "experiments/probe_measured_archive.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-v4-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install probe dependencies
        run: python -m pip install scipy h5py

      - name: Download immutable Zenodo v4 content endpoint
        env:
          EXPECTED_MD5: "e26e030427345a45535e4c86ca5537f5"
          DOWNLOAD_URL: "https://zenodo.org/api/records/20494792/files/4.85GHz%20Dataset.zip/content"
        run: |
          set -euo pipefail
          curl \
            --fail \
            --location \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 30 \
            --max-time 600 \
            --user-agent "WCL2026-1744-reproducibility-probe/1.2" \
            --output measured_archive.zip \
            "$DOWNLOAD_URL"

          printf '%s  %s\n' "$EXPECTED_MD5" measured_archive.zip | md5sum --check --strict
          test "$(head -c 4 measured_archive.zip | od -An -tx1 | tr -d ' \n')" = "504b0304"

          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("measured_archive.zip")
          sha256 = hashlib.sha256()
          with path.open("rb") as handle:
              for block in iter(lambda: handle.read(8 * 1024 * 1024), b""):
                  sha256.update(block)
          metadata = {
              "selected_zenodo_record_id": "20494792",
              "record_doi": "10.5281/zenodo.20494792",
              "record_version": "v4",
              "filename": "4.85GHz Dataset.zip",
              "repository_checksum": "md5:e26e030427345a45535e4c86ca5537f5",
              "downloaded_size_bytes": path.stat().st_size,
              "downloaded_md5": "e26e030427345a45535e4c86ca5537f5",
              "downloaded_sha256": sha256.hexdigest(),
              "download_endpoint_type": "immutable_zenodo_api_content",
              "paper_eligible": False,
          }
          Path("source_metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(json.dumps(metadata, indent=2, sort_keys=True))
          PY

      - name: Inventory ZIP and MATLAB structures
        run: |
          python experiments/probe_measured_archive.py \
            --archive measured_archive.zip \
            --source-metadata source_metadata.json \
            --output-dir measured_probe_artifact

      - name: Remove raw archive
        if: always()
        run: rm -f measured_archive.zip

      - name: Upload provenance-only artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: measured-trace-provenance-probe-v4-direct
          path: |
            source_metadata.json
            measured_probe_artifact/
          if-no-files-found: error
          retention-days: 30
