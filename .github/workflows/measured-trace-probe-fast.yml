name: Measured-trace archive probe fast fallback

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/measured-trace-probe-fast.yml"
      - "experiments/probe_measured_archive.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-zenodo-archive-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install probe dependencies
        run: python -m pip install requests scipy h5py

      - name: Download a version-pinned Zenodo archive
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import time
          from pathlib import Path

          import requests

          filename = "4.85GHz Dataset.zip"
          # Prefer the current record. The v4 record is an explicit, immutable
          # fallback—not a silent substitution—when the current endpoint is
          # rate-limited. The selected DOI/version/checksum is recorded below.
          record_ids = ["20609873", "20494792"]
          session = requests.Session()
          session.headers["User-Agent"] = "WCL2026-1744-reproducibility-probe/1.1"

          def get(url: str, *, stream: bool = False):
              last = None
              for delay in (0, 3, 8, 15):
                  if delay:
                      time.sleep(delay)
                  try:
                      response = session.get(
                          url,
                          stream=stream,
                          timeout=(20, 180),
                          allow_redirects=True,
                      )
                      if response.status_code == 200:
                          return response
                      last = RuntimeError(f"HTTP {response.status_code} for {url}")
                      if response.status_code not in {408, 425, 429, 500, 502, 503, 504}:
                          break
                  except Exception as exc:
                      last = exc
              raise RuntimeError(f"Request failed for {url}: {last}")

          failures = []
          selected = None
          metadata = None
          file_info = None
          for record_id in record_ids:
              try:
                  candidate_metadata = get(
                      f"https://zenodo.org/api/records/{record_id}"
                  ).json()
                  matches = [
                      item
                      for item in candidate_metadata.get("files", [])
                      if item.get("key") == filename or item.get("filename") == filename
                  ]
                  if len(matches) != 1:
                      raise RuntimeError(
                          f"Expected one {filename!r}; found "
                          f"{[item.get('key') for item in candidate_metadata.get('files', [])]}"
                      )
                  selected = record_id
                  metadata = candidate_metadata
                  file_info = matches[0]
                  break
              except Exception as exc:
                  failures.append({"record_id": record_id, "error": repr(exc)})

          if selected is None or metadata is None or file_info is None:
              raise RuntimeError(f"No pinned Zenodo record was reachable: {failures}")

          links = file_info.get("links", {})
          download_url = links.get("content") or links.get("self")
          if not download_url:
              raise RuntimeError(f"No content link in Zenodo file metadata: {file_info}")

          response = get(str(download_url), stream=True)
          output = Path("measured_archive.zip")
          md5 = hashlib.md5()
          sha256 = hashlib.sha256()
          size = 0
          with output.open("wb") as handle:
              for chunk in response.iter_content(8 * 1024 * 1024):
                  if chunk:
                      handle.write(chunk)
                      md5.update(chunk)
                      sha256.update(chunk)
                      size += len(chunk)

          expected_checksum = str(file_info.get("checksum", ""))
          actual_md5 = md5.hexdigest()
          if expected_checksum:
              algorithm, expected = expected_checksum.split(":", 1)
              if algorithm.lower() != "md5" or actual_md5.lower() != expected.lower():
                  raise RuntimeError(
                      f"Repository checksum {expected_checksum} does not match md5:{actual_md5}"
                  )
          if size < 1_000_000 or output.read_bytes()[:4] != b"PK\x03\x04":
              raise RuntimeError(f"Invalid downloaded ZIP: size={size}")

          source_metadata = {
              "selected_zenodo_record_id": selected,
              "record_doi": metadata.get("doi"),
              "record_version": metadata.get("metadata", {}).get("version"),
              "record_updated": metadata.get("updated"),
              "filename": filename,
              "repository_checksum": expected_checksum,
              "downloaded_size_bytes": size,
              "downloaded_md5": actual_md5,
              "downloaded_sha256": sha256.hexdigest(),
              "download_url_from_api": str(download_url),
              "records_attempted_in_order": record_ids,
              "failed_record_attempts_before_selection": failures,
          }
          Path("source_metadata.json").write_text(
              json.dumps(source_metadata, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(json.dumps(source_metadata, indent=2, sort_keys=True))
          PY

      - name: Inventory ZIP and MATLAB structures
        run: |
          python experiments/probe_measured_archive.py \
            --archive measured_archive.zip \
            --source-metadata source_metadata.json \
            --output-dir measured_probe_artifact

      - name: Remove raw archive
        if: always()
        run: rm -f measured_archive.zip

      - name: Upload provenance-only artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: measured-trace-provenance-probe-fast
          path: |
            source_metadata.json
            measured_probe_artifact/
          if-no-files-found: error
          retention-days: 30
