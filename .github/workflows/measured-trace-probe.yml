name: Measured-trace archive probe

on:
  push:
    paths:
      - ".github/workflows/measured-trace-probe.yml"
      - "experiments/probe_measured_archive.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-zenodo-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install probe dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests scipy h5py

      - name: Download pinned Zenodo archive and verify repository checksum
        env:
          ZENODO_RECORD_ID: "20609873"
          ZENODO_FILE_NAME: "4.85GHz Dataset.zip"
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import time
          from pathlib import Path
          from urllib.parse import quote

          import requests

          record_id = os.environ["ZENODO_RECORD_ID"]
          filename = os.environ["ZENODO_FILE_NAME"]
          api_url = f"https://zenodo.org/api/records/{record_id}"
          output = Path("measured_archive.zip")
          metadata_output = Path("source_metadata.json")

          session = requests.Session()
          session.headers.update(
              {
                  "User-Agent": (
                      "WCL2026-1744-reproducibility-probe/1.0 "
                      "(research workflow; contact via repository)"
                  )
              }
          )

          def request_with_retry(url: str, *, stream: bool = False) -> requests.Response:
              delay = 5
              last_error: Exception | None = None
              for attempt in range(1, 9):
                  try:
                      response = session.get(
                          url,
                          stream=stream,
                          timeout=(30, 300),
                          allow_redirects=True,
                      )
                      if response.status_code == 200:
                          return response
                      if response.status_code not in {408, 425, 429, 500, 502, 503, 504}:
                          response.raise_for_status()
                      retry_after = response.headers.get("Retry-After")
                      sleep_seconds = int(retry_after) if retry_after and retry_after.isdigit() else delay
                      print(
                          f"Attempt {attempt}: HTTP {response.status_code}; "
                          f"retrying after {sleep_seconds}s"
                      )
                      time.sleep(sleep_seconds)
                      delay = min(delay * 2, 60)
                  except Exception as exc:  # network retry boundary
                      last_error = exc
                      print(f"Attempt {attempt}: {type(exc).__name__}: {exc}")
                      time.sleep(delay)
                      delay = min(delay * 2, 60)
              raise RuntimeError(f"Unable to retrieve {url}: {last_error}")

          metadata = request_with_retry(api_url).json()
          candidates = [
              item
              for item in metadata.get("files", [])
              if item.get("key") == filename or item.get("filename") == filename
          ]
          if len(candidates) != 1:
              available = [item.get("key") or item.get("filename") for item in metadata.get("files", [])]
              raise RuntimeError(
                  f"Expected exactly one {filename!r} in record {record_id}; found {available}"
              )

          file_info = candidates[0]
          expected_checksum = str(file_info.get("checksum", ""))
          links = file_info.get("links", {})
          download_url = links.get("content") or links.get("self")
          if not download_url:
              download_url = (
                  f"https://zenodo.org/records/{record_id}/files/"
                  f"{quote(filename)}?download=1"
              )

          response = request_with_retry(str(download_url), stream=True)
          md5 = hashlib.md5()
          sha256 = hashlib.sha256()
          size = 0
          with output.open("wb") as handle:
              for chunk in response.iter_content(chunk_size=8 * 1024 * 1024):
                  if not chunk:
                      continue
                  handle.write(chunk)
                  md5.update(chunk)
                  sha256.update(chunk)
                  size += len(chunk)

          if size < 1_000_000:
              prefix = output.read_bytes()[:200]
              raise RuntimeError(
                  f"Downloaded object is unexpectedly small ({size} bytes): {prefix!r}"
              )
          if output.read_bytes()[:4] != b"PK\x03\x04":
              raise RuntimeError("Downloaded object does not have a ZIP local-file signature")

          actual_md5 = md5.hexdigest()
          actual_sha256 = sha256.hexdigest()
          if expected_checksum:
              algorithm, expected = expected_checksum.split(":", 1)
              if algorithm.lower() != "md5":
                  raise RuntimeError(f"Unsupported repository checksum: {expected_checksum}")
              if actual_md5.lower() != expected.lower():
                  raise RuntimeError(
                      f"Checksum mismatch: expected {expected_checksum}, got md5:{actual_md5}"
                  )

          source_metadata = {
              "zenodo_record_id": record_id,
              "record_doi": metadata.get("doi"),
              "record_version": metadata.get("metadata", {}).get("version"),
              "record_updated": metadata.get("updated"),
              "filename": filename,
              "repository_checksum": expected_checksum,
              "downloaded_size_bytes": size,
              "downloaded_md5": actual_md5,
              "downloaded_sha256": actual_sha256,
              "download_url_from_api": str(download_url),
          }
          metadata_output.write_text(
              json.dumps(source_metadata, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(json.dumps(source_metadata, indent=2, sort_keys=True))
          PY

      - name: Inventory ZIP and MATLAB structures
        run: |
          python experiments/probe_measured_archive.py \
            --archive measured_archive.zip \
            --source-metadata source_metadata.json \
            --output-dir measured_probe_artifact

      - name: Remove raw archive before artifact upload
        if: always()
        run: rm -f measured_archive.zip

      - name: Upload provenance-only probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: measured-trace-provenance-probe
          path: |
            source_metadata.json
            measured_probe_artifact/
          if-no-files-found: error
          retention-days: 30
