name: OpenCSI Figshare metadata probe

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/opencsi-figshare-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe-opencsi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch Figshare metadata and list immutable files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p opencsi_probe
          curl --fail --location --retry 5 --retry-all-errors \
            --connect-timeout 20 --max-time 120 \
            --user-agent "WCL2026-1744-reproducibility-probe/1.0" \
            --output opencsi_probe/article.json \
            "https://api.figshare.com/v2/articles/19596379"
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          article = json.loads(Path("opencsi_probe/article.json").read_text())
          rows = []
          for item in article.get("files", []):
              rows.append({
                  "id": item.get("id"),
                  "name": item.get("name"),
                  "size": item.get("size"),
                  "computed_md5": item.get("computed_md5"),
                  "download_url": item.get("download_url"),
                  "is_link_only": item.get("is_link_only"),
              })
          with Path("opencsi_probe/files.csv").open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=list(rows[0]) if rows else ["id","name","size","computed_md5","download_url","is_link_only"])
              writer.writeheader()
              writer.writerows(rows)
          summary = {
              "article_id": article.get("id"),
              "doi": article.get("doi"),
              "title": article.get("title"),
              "license": article.get("license"),
              "published_date": article.get("published_date"),
              "modified_date": article.get("modified_date"),
              "file_count": len(rows),
              "total_size_bytes": sum(int(row["size"] or 0) for row in rows),
              "paper_eligible": False,
              "purpose": "metadata_only",
          }
          Path("opencsi_probe/summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True))
          print(json.dumps(summary, indent=2, sort_keys=True))
          print("FILES")
          for row in rows:
              print(f"{row['name']} size={row['size']} md5={row['computed_md5']} url={row['download_url']}")
          PY

      - name: Upload metadata-only artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencsi-figshare-metadata
          path: opencsi_probe/
          if-no-files-found: error
          retention-days: 30
