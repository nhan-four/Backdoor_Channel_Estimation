name: USC measured data endpoint diagnostic

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/usc-measured-data-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-usc-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe official USC archive endpoints
        shell: bash
        run: |
          set +e
          base="https://public-ultralab.s3.us-west-1.amazonaws.com/public-ultralab/CF-mMIMO%3A+drone+measurement+2020"
          files=(
            H_AP35m_UE1.zip H_AP70m_UE1.zip
            H_AP35m_UE2.zip H_AP70m_UE2.zip
            H_AP35m_UE3.zip H_AP70m_UE3.zip
            H_AP35m_UE4.zip H_AP70m_UE4.zip
          )
          for file in "${files[@]}"; do
            url="$base/$file"
            result=$(curl --silent --show-error --head --location \
              --connect-timeout 10 --max-time 30 \
              --write-out 'STATUS=%{http_code} SIZE=%{size_download} URL=%{url_effective}' \
              "$url" 2>&1)
            status=$(printf '%s\n' "$result" | sed -n 's/^STATUS=\([0-9]*\).*/\1/p' | tail -1)
            length=$(printf '%s\n' "$result" | tr -d '\r' | sed -n 's/^[Cc]ontent-[Ll]ength: *//p' | tail -1)
            type=$(printf '%s\n' "$result" | tr -d '\r' | sed -n 's/^[Cc]ontent-[Tt]ype: *//p' | tail -1)
            echo "$file HTTP=${status:-unknown} CONTENT_LENGTH=${length:-unknown} CONTENT_TYPE=${type:-unknown}"
          done
          exit 0
