name: OpenCSI semantic structure probe

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/opencsi-semantic-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-semantics:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Install data tools
        run: python -m pip install pandas tables numpy scipy

      - name: Download, verify, and extract OpenCSI
        env:
          OPENCSI_URL: "https://ndownloader.figshare.com/files/34809589"
          EXPECTED_MD5: "7d83f1682d05fa230bba3e90f755c580"
        run: |
          set -euo pipefail
          curl --fail --location --retry 8 --retry-all-errors \
            --connect-timeout 30 --max-time 2400 \
            --user-agent "WCL2026-1744-reproducibility-download/1.0" \
            --output openCSI.zip "$OPENCSI_URL"
          printf '%s  %s\n' "$EXPECTED_MD5" openCSI.zip | md5sum --check --strict
          unzip -q openCSI.zip data.h5

      - name: Probe logical pandas tables and grouping
        run: |
          mkdir -p opencsi_semantic_probe
          python - <<'PY'
          from __future__ import annotations

          import csv
          import json
          from collections import Counter
          from pathlib import Path

          import numpy as np
          import pandas as pd
          import tables

          out = Path("opencsi_semantic_probe")
          report = {
              "source_doi": "10.6084/m9.figshare.19596379.v1",
              "archive_md5": "7d83f1682d05fa230bba3e90f755c580",
              "paper_eligible": False,
              "purpose": "logical_schema_and_split_design_probe_only",
          }

          with pd.HDFStore("data.h5", mode="r") as store:
              report["keys"] = store.keys()
              x_storer = store.get_storer("X")
              y_storer = store.get_storer("y")
              report["X_nrows"] = int(x_storer.nrows)
              report["y_nrows"] = int(y_storer.nrows)
              report["rows_per_snapshot_exact"] = int(x_storer.nrows) / int(y_storer.nrows)
              report["X_data_columns"] = list(x_storer.data_columns)
              report["y_data_columns"] = list(y_storer.data_columns)

              x_head = store.select("X", start=0, stop=120)
              x_tail = store.select("X", start=max(0, x_storer.nrows - 120), stop=x_storer.nrows)
              y_head = store.select("y", start=0, stop=120)
              y_tail = store.select("y", start=max(0, y_storer.nrows - 120), stop=y_storer.nrows)
              x_head.to_csv(out / "X_head.csv")
              x_tail.to_csv(out / "X_tail.csv")
              y_head.to_csv(out / "y_head.csv")
              y_tail.to_csv(out / "y_tail.csv")

              report["X_columns"] = list(x_head.columns)
              report["X_dtypes"] = {str(k): str(v) for k, v in x_head.dtypes.items()}
              report["y_columns"] = list(y_head.columns)
              report["y_dtypes"] = {str(k): str(v) for k, v in y_head.dtypes.items()}
              report["X_head_index"] = [int(v) for v in x_head.index[:20]]
              report["y_head_index"] = [int(v) for v in y_head.index[:20]]

          fingerprint_counts = Counter()
          snapshot_counts = Counter()
          tap_counts = Counter()
          pair_row_counts = Counter()
          monotonic_violations = 0
          previous_pair = None
          sampled_pairs = []

          with tables.open_file("data.h5", mode="r") as h5:
              x_table = h5.root.X.table
              y_table = h5.root.y.table
              report["X_table_colnames"] = list(x_table.colnames)
              report["y_table_colnames"] = list(y_table.colnames)

              chunk = 1_000_000
              nrows = int(x_table.nrows)
              for start in range(0, nrows, chunk):
                  stop = min(start + chunk, nrows)
                  taps = x_table.cols.values_block_0[start:stop, 0]
                  ids = x_table.cols.values_block_2[start:stop]
                  fingerprint_ids = ids[:, 0]
                  snapshot_ids = ids[:, 1]

                  unique_fp, fp_n = np.unique(fingerprint_ids, return_counts=True)
                  fingerprint_counts.update({int(k): int(v) for k, v in zip(unique_fp, fp_n)})
                  unique_snap, snap_n = np.unique(snapshot_ids, return_counts=True)
                  snapshot_counts.update({int(k): int(v) for k, v in zip(unique_snap, snap_n)})
                  unique_tap, tap_n = np.unique(taps, return_counts=True)
                  tap_counts.update({int(k): int(v) for k, v in zip(unique_tap, tap_n)})

                  pair_matrix = np.stack([fingerprint_ids, snapshot_ids], axis=1)
                  changes = np.ones(len(pair_matrix), dtype=bool)
                  if len(pair_matrix) > 1:
                      changes[1:] = np.any(pair_matrix[1:] != pair_matrix[:-1], axis=1)
                  starts = np.flatnonzero(changes)
                  ends = np.r_[starts[1:], len(pair_matrix)]
                  for local_start, local_end in zip(starts, ends):
                      pair = (int(pair_matrix[local_start, 0]), int(pair_matrix[local_start, 1]))
                      pair_row_counts[pair] += int(local_end - local_start)
                      if previous_pair is not None and pair < previous_pair:
                          monotonic_violations += 1
                      previous_pair = pair
                      if len(sampled_pairs) < 100:
                          sampled_pairs.append({
                              "fingerprint_id": pair[0],
                              "snapshot_id": pair[1],
                              "rows": int(local_end - local_start),
                          })

              y_index = y_table.col("index")
              y_values = y_table.col("values_block_0")
              report["y_index_min"] = int(y_index.min())
              report["y_index_max"] = int(y_index.max())
              report["y_index_unique"] = int(np.unique(y_index).size)
              report["y_xy_min"] = [float(v) for v in np.nanmin(y_values, axis=0)]
              report["y_xy_max"] = [float(v) for v in np.nanmax(y_values, axis=0)]
              report["y_xy_finite_fraction"] = float(np.isfinite(y_values).mean())

          pair_lengths = np.fromiter(pair_row_counts.values(), dtype=np.int64)
          fp_rows = np.fromiter(fingerprint_counts.values(), dtype=np.int64)
          snap_rows = np.fromiter(snapshot_counts.values(), dtype=np.int64)
          report.update({
              "fingerprint_id_count": len(fingerprint_counts),
              "fingerprint_id_min": min(fingerprint_counts) if fingerprint_counts else None,
              "fingerprint_id_max": max(fingerprint_counts) if fingerprint_counts else None,
              "snapshot_id_count": len(snapshot_counts),
              "snapshot_id_min": min(snapshot_counts) if snapshot_counts else None,
              "snapshot_id_max": max(snapshot_counts) if snapshot_counts else None,
              "tap_id_counts": dict(sorted(tap_counts.items())),
              "fingerprint_row_count_min": int(fp_rows.min()) if fp_rows.size else None,
              "fingerprint_row_count_max": int(fp_rows.max()) if fp_rows.size else None,
              "fingerprint_row_count_median": float(np.median(fp_rows)) if fp_rows.size else None,
              "snapshot_row_count_min": int(snap_rows.min()) if snap_rows.size else None,
              "snapshot_row_count_max": int(snap_rows.max()) if snap_rows.size else None,
              "pair_count": len(pair_row_counts),
              "pair_row_count_min": int(pair_lengths.min()) if pair_lengths.size else None,
              "pair_row_count_max": int(pair_lengths.max()) if pair_lengths.size else None,
              "pair_row_count_unique_values": [int(v) for v in np.unique(pair_lengths)],
              "pair_monotonic_violations": int(monotonic_violations),
              "sampled_pairs": sampled_pairs,
          })

          for filename, counter, key_name in [
              ("fingerprint_row_counts.csv", fingerprint_counts, "fingerprint_id"),
              ("snapshot_row_counts.csv", snapshot_counts, "snapshot_id"),
              ("tap_row_counts.csv", tap_counts, "tap_id"),
          ]:
              with (out / filename).open("w", newline="", encoding="utf-8") as handle:
                  writer = csv.writer(handle)
                  writer.writerow([key_name, "row_count"])
                  for key, value in sorted(counter.items()):
                      writer.writerow([key, value])

          (out / "summary.json").write_text(json.dumps(report, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Remove raw measurement files
        if: always()
        run: rm -f openCSI.zip data.h5

      - name: Upload semantic probe only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencsi-semantic-structure-probe
          path: opencsi_semantic_probe/
          if-no-files-found: error
          retention-days: 30
