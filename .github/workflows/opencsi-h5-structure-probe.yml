name: OpenCSI HDF5 structure probe

on:
  pull_request:
    paths:
      - ".github/measured-trace-probe.trigger"
      - ".github/workflows/opencsi-h5-structure-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect-hdf5:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Install HDF5 tools
        run: python -m pip install h5py numpy

      - name: Download, verify, and extract OpenCSI
        env:
          OPENCSI_URL: "https://ndownloader.figshare.com/files/34809589"
          EXPECTED_MD5: "7d83f1682d05fa230bba3e90f755c580"
        run: |
          set -euo pipefail
          curl --fail --location --retry 8 --retry-all-errors \
            --connect-timeout 30 --max-time 2400 \
            --user-agent "WCL2026-1744-reproducibility-download/1.0" \
            --output openCSI.zip "$OPENCSI_URL"
          printf '%s  %s\n' "$EXPECTED_MD5" openCSI.zip | md5sum --check --strict
          unzip -q openCSI.zip data.h5

      - name: Inventory HDF5 schema and bounded samples
        run: |
          mkdir -p opencsi_h5_probe
          python - <<'PY'
          from __future__ import annotations

          import csv
          import json
          import math
          from pathlib import Path

          import h5py
          import numpy as np

          path = Path("data.h5")
          rows = []
          samples = {}

          with h5py.File(path, "r") as h5:
              root_attrs = {str(k): repr(v) for k, v in h5.attrs.items()}

              def visitor(name, obj):
                  if isinstance(obj, h5py.Group):
                      rows.append({
                          "path": name,
                          "kind": "group",
                          "shape": "",
                          "dtype": "",
                          "chunks": "",
                          "compression": "",
                          "size_elements": "",
                          "attrs": json.dumps({str(k): repr(v) for k, v in obj.attrs.items()}, sort_keys=True),
                      })
                      return
                  if not isinstance(obj, h5py.Dataset):
                      return
                  rows.append({
                      "path": name,
                      "kind": "dataset",
                      "shape": "x".join(str(v) for v in obj.shape),
                      "dtype": str(obj.dtype),
                      "chunks": repr(obj.chunks),
                      "compression": repr(obj.compression),
                      "size_elements": int(obj.size),
                      "attrs": json.dumps({str(k): repr(v) for k, v in obj.attrs.items()}, sort_keys=True),
                  })

                  # Read at most 4096 scalar values from the leading bounded slab.
                  if obj.size == 0 or obj.dtype.kind not in "biufc":
                      return
                  selection = []
                  budget = 4096
                  for dim in obj.shape:
                      take = min(dim, max(1, int(round(budget ** (1 / max(1, obj.ndim))))))
                      selection.append(slice(0, take))
                  try:
                      arr = np.asarray(obj[tuple(selection)])
                      flat = arr.reshape(-1)[:4096]
                      if np.iscomplexobj(flat):
                          finite = np.isfinite(flat.real) & np.isfinite(flat.imag)
                          vals = np.abs(flat[finite])
                          samples[name] = {
                              "sample_shape": list(arr.shape),
                              "finite_fraction": float(finite.mean()) if finite.size else None,
                              "abs_min": float(vals.min()) if vals.size else None,
                              "abs_max": float(vals.max()) if vals.size else None,
                              "abs_mean": float(vals.mean()) if vals.size else None,
                              "real_mean": float(flat[finite].real.mean()) if finite.any() else None,
                              "imag_mean": float(flat[finite].imag.mean()) if finite.any() else None,
                          }
                      else:
                          finite = np.isfinite(flat)
                          vals = flat[finite].astype(np.float64, copy=False)
                          samples[name] = {
                              "sample_shape": list(arr.shape),
                              "finite_fraction": float(finite.mean()) if finite.size else None,
                              "min": float(vals.min()) if vals.size else None,
                              "max": float(vals.max()) if vals.size else None,
                              "mean": float(vals.mean()) if vals.size else None,
                          }
                  except Exception as exc:
                      samples[name] = {"sample_error": f"{type(exc).__name__}: {exc}"}

              h5.visititems(visitor)

          with Path("opencsi_h5_probe/schema.csv").open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(handle, fieldnames=["path", "kind", "shape", "dtype", "chunks", "compression", "size_elements", "attrs"])
              writer.writeheader()
              writer.writerows(rows)

          summary = {
              "source_doi": "10.6084/m9.figshare.19596379.v1",
              "archive_md5": "7d83f1682d05fa230bba3e90f755c580",
              "h5_size_bytes": path.stat().st_size,
              "root_attrs": root_attrs,
              "object_count": len(rows),
              "dataset_count": sum(row["kind"] == "dataset" for row in rows),
              "group_count": sum(row["kind"] == "group" for row in rows),
              "paper_eligible": False,
              "purpose": "schema_and_bounded_sample_probe_only",
          }
          Path("opencsi_h5_probe/summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8")
          Path("opencsi_h5_probe/bounded_samples.json").write_text(json.dumps(samples, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(summary, indent=2, sort_keys=True))
          print("SCHEMA")
          for row in rows:
              print(row)
          print("BOUNDED SAMPLES")
          print(json.dumps(samples, indent=2, sort_keys=True))
          PY

      - name: Remove raw measurement files
        if: always()
        run: rm -f openCSI.zip data.h5

      - name: Upload schema probe only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencsi-h5-structure-probe
          path: opencsi_h5_probe/
          if-no-files-found: error
          retention-days: 30
